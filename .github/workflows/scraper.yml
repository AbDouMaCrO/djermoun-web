name: Automated 24h Scraper

"on":
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Car listing URL to scrape'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: sudo apt-get install -y tesseract-ocr

      - name: Install and Run Scraper
        working-directory: python-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLIPDROP_API_KEY: ${{ secrets.CLIPDROP_API_KEY }}
          TARGET_URL: ${{ github.event.inputs.target_url || github.event.client_payload.url }}
        run: |
          pip install -r requirements.txt
          python scraper.py
